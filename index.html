<!DOCTYPE html>
<html>
<head>
    <title>XAUUSD Live OB + CVD</title>
    <meta charset="utf-8">
    <style>
        body { margin: 0; background: #0d0d0d; color: #fff; font-family: Arial; }
        #tv_chart { height: 85vh; }
        #info { 
            padding: 10px 20px; 
            background: #1a1a1a; 
            display: flex; 
            justify-content: space-between;
            border-bottom: 2px solid #333;
        }
        .bull { color: #00ff88; }
        .bear { color: #ff3d3d; }
        .cvd-neg { color: #ff3d3d; }
        .cvd-pos { color: #00ff88; }
    </style>
</head>
<body>
    <div id="info">
        <div>XAUUSD H1 Order Blocks</div>
        <div id="cvd">CVD: Loading...</div>
        <div id="update">Updated: -</div>
    </div>
    <div id="tv_chart"></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let tvWidget = new TradingView.widget({
            "autosize": true,
            "symbol": "OANDA:XAUUSD",
            "interval": "60",
            "timezone": "Asia/Jakarta",
            "theme": "dark",
            "style": "1",
            "locale": "id",
            "toolbar_bg": "#1a1a1a",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": false,
            "container_id": "tv_chart",
            "studies": ["Volume@tv-basicstudies"],
            "disabled_features": ["use_localstorage_for_settings"],
            "enabled_features": ["study_templates"],
        });

        async function drawOB() {
            const res = await fetch('./orderblocks.json?'+Date.now());
            const data = await res.json();
            
            document.getElementById('update').innerText = 'Updated: ' + data.updated;
            
            tvWidget.onChartReady(() => {
                const chart = tvWidget.activeChart();
                
                // Hapus OB lama
                chart.getAllShapes().forEach(s => {
                    if(s.name === 'rectangle') chart.removeEntity(s.id);
                });
                
                // Gambar OB baru
                data.H1.forEach(ob => {
                    chart.createShape(
                        { time: new Date(ob.time).getTime()/1000, price: ob.top },
                        {
                            shape: "rectangle",
                            lock: true,
                            disableSelection: true,
                            overrides: {
                                backgroundColor: ob.type === 'bullish' ? "rgba(0,255,136,0.15)" : "rgba(255,61,61,0.15)",
                                borderColor: ob.type === 'bullish' ? "#00ff88" : "#ff3d3d",
                                borderWidth: 2,
                            }
                        }
                    ).then(id => {
                        chart.getShapeById(id).setPoints([
                            { time: new Date(ob.time).getTime()/1000, price: ob.top },
                            { time: Date.now()/1000, price: ob.bottom }
                        ]);
                    });
                });
            });
        }

        async function updateCVD() {
            const res = await fetch('./cvd.json?'+Date.now());
            const data = await res.json();
            const cvdEl = document.getElementById('cvd');
            cvdEl.innerText = `CVD: ${data.cvd} | Price: ${data.price}`;
            cvdEl.className = data.cvd >= 0 ? 'cvd-pos' : 'cvd-neg';
        }

        // Jalan pertama kali
        tvWidget.onChartReady(() => {
            drawOB();
            updateCVD();
        });

        // Auto refresh tiap 1 menit
        setInterval(() => {
            drawOB();
            updateCVD();
        }, 60000);
    </script>
</body>
</html>
