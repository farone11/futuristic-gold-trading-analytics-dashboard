<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XAUUSD Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body class="bg-gray-950 text-white p-8">
  <h1 class="text-4xl font-bold text-yellow-400 mb-8">XAUUSD Analytics Dashboard</h1>
  
  <div class="grid grid-cols-3 gap-6 mb-8">
    <div class="bg-gray-900 p-6 rounded-xl border border-yellow-500/20">
      <div class="text-gray-400">Harga Sekarang</div>
      <div class="text-3xl font-bold text-green-400">$2,847.32</div>
    </div>
    <div class="bg-gray-900 p-6 rounded-xl border border-yellow-500/20">
      <div class="text-gray-400">Prediksi AI 4H</div>
      <div class="text-3xl font-bold text-green-400">$2,861.10 ▲ 1.2%</div>
    </div>
    <div class="bg-gray-900 p-6 rounded-xl border border-yellow-500/20">
      <div class="text-gray-400">Akurasi Model</div>
      <div class="text-3xl font-bold text-yellow-400">87.3%</div>
    </div>
  </div>

  <div class="bg-gray-900 p-6 rounded-xl border border-yellow-500/20">
    <div id="chart"></div>
  </div>

<script>
  var options = {
    chart: { type: 'line', height: 400, foreColor: '#9CA3AF' },
    series: [{ name: 'XAUUSD', data: [2810, 2825, 2830, 2847, 2855] }],
    xaxis: { categories: ['Senin','Selasa','Rabu','Kamis','Jumat'] },
    colors: ['#FBBF24'],
    theme: { mode: 'dark' }
  }
  var chart = new ApexCharts(document.querySelector("#chart"), options);
  chart.render();
</script>
</body>
</html>
