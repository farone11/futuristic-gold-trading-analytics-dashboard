name: Retail Sentiment Daily
on:
  schedule:
    - cron: '*/15 * * * *' # Tiap 15 menit
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install playwright pytz
      - run: playwright install chromium
      - run: python scrape_retail.py
      - run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add retail_sentiment.json
          git commit -m "Update retail sentiment" || exit 0
          git push
