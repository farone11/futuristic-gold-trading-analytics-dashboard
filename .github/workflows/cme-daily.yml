name: CME OI Daily Update

on:
  schedule:
    - cron: '0 10 * * *' # 10:00 UTC = 05:00 AM Chicago CDT
  workflow_dispatch: # Bisa run manual buat tes

jobs:
  scrape-cme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install playwright pandas pytz
          playwright install chromium
          playwright install-deps
          
      - name: Run CME Scraper
        run: python scrape_cme.py
        
      - name: Commit & Push if changed
        run: |
          git config --global user.name 'CME Bot'
          git config --global user.email 'bot@users.noreply.github.com'
          git add institutional_flow.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update CME OI $(date +'%Y-%m-%d')"
          git push
