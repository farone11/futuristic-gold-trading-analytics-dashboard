<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional Flow - FARONE GOLD AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; }
      .font-orbitron { font-family: 'Orbitron', sans-serif; }
      .glow-gold { text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
      .card-glow { box-shadow: 0 0 40px rgba(255, 215, 0, 0.1); }
      .live-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="bg-[#0a0a0f] text-white">
    <div class="p-8">
        <a href="/" class="text-yellow-400 hover:text-yellow-300 text-sm mb-6 inline-block">← Back to Dashboard</a>
        
        <h1 class="font-orbitron text-4xl font-black mb-2 glow-gold">Institutional Flow Analysis</h1>
        <div class="flex items-center gap-2 mb-8">
            <span class="live-dot w-2 h-2 bg-green-500 rounded-full"></span>
            <span class="text-sm text-green-400" id="status">Live from MT5 + Tailscale</span>
        </div>

        <div class="grid grid-cols-3 gap-6">
            <!-- CFTC COT -->
            <div class="bg-[#13131f] border border-yellow-900/20 rounded-xl p-6 card-glow">
                <h3 class="font-orbitron text-lg font-bold text-yellow-400 mb-4">CFTC COT Report</h3>
                <p class="text-gray-400 text-sm mb-4" id="cftc-date">As of --/--/--</p>
                <div class="text-center mb-4">
                    <div class="font-orbitron text-5xl font-black text-yellow-400" id="cftc-net">---,---</div>
                    <div class="text-gray-400 text-sm mt-2">Net Non-Commercial</div>
                </div>
                <div class="flex justify-between text-sm pt-4 border-t border-gray-800">
                    <div><span class="text-green-400">Long: </span><span id="cftc-long">---,---</span></div>
                    <div><span class="text-red-400">Short: </span><span id="cftc-short">---,---</span></div>
                </div>
            </div>

            <!-- Retail Sentiment -->
            <div class="bg-[#13131f] border border-yellow-900/20 rounded-xl p-6 card-glow">
                <h3 class="font-orbitron text-lg font-bold text-yellow-400 mb-4">Retail Sentiment SWFX</h3>
                <p class="text-gray-400 text-sm mb-4" id="retail-source">Live MT5</p>
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <div class="font-orbitron text-5xl font-black text-green-400" id="retail-long">--%</div>
                        <div class="text-gray-400 text-sm mt-2">Long</div>
                    </div>
                    <div class="text-right">
                        <div class="font-orbitron text-5xl font-black text-red-400" id="retail-short">--%</div>
                        <div class="text-gray-400 text-sm mt-2">Short</div>
                    </div>
                </div>
            </div>

            <!-- SMI -->
            <div class="bg-[#13131f] border border-yellow-900/20 rounded-xl p-6 card-glow">
                <h3 class="font-orbitron text-lg font-bold text-yellow-400 mb-4">Smart Money Index</h3>
                <div class="text-center mb-4">
                    <div class="font-orbitron text-6xl font-black text-yellow-400" id="smi-value">--</div>
                    <div class="font-orbitron text-2xl font-bold mt-2" id="smi-bias">STANDBY</div>
                </div>
                <p class="text-xs text-gray-600 text-center" id="smi-updated">Updated: --:--:--</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000/api/institutional' 
            : 'https://desktop-u6fj6m8.tail379038.ts.net/api/institutional';

        async function updateInstitutional() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                if(data.error) {
                    document.getElementById('status').innerText = 'Error: ' + data.error;
                    document.getElementById('status').className = 'text-sm text-red-400';
                    return;
                }

                document.getElementById('status').innerText = 'Live from MT5 + Tailscale';
                document.getElementById('status').className = 'text-sm text-green-400';

                // CFTC
                document.getElementById('cftc-date').innerText = 'As of ' + data.cftc.date;
                document.getElementById('cftc-net').innerText = data.cftc.net.toLocaleString();
                document.getElementById('cftc-long').innerText = data.cftc.long.toLocaleString();
                document.getElementById('cftc-short').innerText = data.cftc.short.toLocaleString();

                // Retail
                document.getElementById('retail-long').innerText = data.retail.long + '%';
                document.getElementById('retail-short').innerText = data.retail.short + '%';
                document.getElementById('retail-source').innerText = data.retail.source;

                // SMI
                document.getElementById('smi-value').innerText = data.smi.value;
                document.getElementById('smi-bias').innerText = data.smi.bias;
                document.getElementById('smi-bias').className = data.smi.bias === 'BULLISH' 
                    ? 'font-orbitron text-2xl font-bold mt-2 text-green-400' 
                    : data.smi.bias === 'BEARISH' 
                    ? 'font-orbitron text-2xl font-bold mt-2 text-red-400'
                    : 'font-orbitron text-2xl font-bold mt-2 text-yellow-400';
                document.getElementById('smi-updated').innerText = 'Updated: ' + data.smi.updated;

            } catch (e) {
                document.getElementById('status').innerText = 'Server mati';
                document.getElementById('status').className = 'text-sm text-red-400';
            }
        }

        setInterval(updateInstitutional, 5000); // Update 5 detik
        updateInstitutional();
    </script>
</body>
</html>
